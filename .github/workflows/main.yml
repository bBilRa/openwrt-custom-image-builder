name: Build OpenWrt for Cudy TR1200 v1 (Alternative)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup build environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential libncurses-dev zlib1g-dev \
            gawk git gettext libssl-dev xsltproc wget unzip python3 file libelf-dev
      
      - name: Download and prepare Image Builder
        run: |
          wget -q https://downloads.openwrt.org/releases/23.05.4/targets/ramips/mt76x8/openwrt-imagebuilder-23.05.4-ramips-mt76x8.Linux-x86_64.tar.xz
          mkdir -p imagebuilder
          tar -xf openwrt-imagebuilder-*.tar.xz --strip-components=1 -C imagebuilder/
          rm openwrt-imagebuilder-*.tar.xz
      
      - name: List all profiles
        run: |
          cd imagebuilder
          echo "All available profiles:"
          make info | grep "^[a-z]" | head -100
      
      - name: Build firmware with exact profile
        run: |
          cd imagebuilder
          
          # Пробуем разные варианты имени профиля
          PROFILE=""
          
          # Проверяем самый вероятный вариант
          if make info | grep -q "^cudy_tr1200-v1:"; then
            PROFILE="cudy_tr1200-v1"
          elif make info | grep -q "^cudy,tr1200-v1:"; then
            PROFILE="cudy,tr1200-v1"
          elif make info | grep -qi "tr1200"; then
            PROFILE=$(make info | grep -i "tr1200" | head -1 | cut -d: -f1)
          fi
          
          if [ -z "$PROFILE" ]; then
            echo "ERROR: Cannot find Cudy TR1200 profile!"
            echo "Available profiles:"
            make info
            exit 1
          fi
          
          echo "Using profile: $PROFILE"
          
          make image \
            PROFILE="$PROFILE" \
            PACKAGES="kmod-usb-core kmod-usb2 kmod-usb-ohci kmod-usb-net \
              kmod-usb-net-cdc-ether kmod-usb-net-rndis kmod-usb-serial \
              kmod-usb-serial-option kmod-usb-serial-wwan kmod-usb-wdm \
              usb-modeswitch comgt comgt-ncm luci-proto-3g luci-proto-qmi \
              luci-proto-ncm luci-proto-modemmanager modemmanager \
              kmod-fs-ext4 kmod-fs-vfat kmod-fs-exfat block-mount \
              xray-core luci-app-xray luci luci-ssl curl wget htop" \
            BIN_DIR="${{ github.workspace }}/output"
      
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: cudy-tr1200-v1-firmware
          path: output/
          retention-days: 30
