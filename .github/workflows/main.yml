name: Build OpenWrt for Cudy TR1200 v1

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev zlib1g-dev \
            gawk git gettext libssl-dev xsltproc wget unzip python3 file libelf-dev
      
      - name: Download OpenWrt Image Builder
        run: |
          wget https://downloads.openwrt.org/releases/23.05.4/targets/ramips/mt76x8/openwrt-imagebuilder-23.05.4-ramips-mt76x8.Linux-x86_64.tar.xz
          echo "Download completed"
      
      - name: Extract and setup imagebuilder
        run: |
          tar -xf openwrt-imagebuilder-*.tar.xz
          
          IMAGEBUILDER_DIR=$(find . -maxdepth 1 -type d -name "openwrt-imagebuilder-*" | head -1)
          echo "Found imagebuilder directory: $IMAGEBUILDER_DIR"
          
          if [ ! -d "$IMAGEBUILDER_DIR" ]; then
            echo "ERROR: Imagebuilder directory not found!"
            exit 1
          fi
          
          mv "$IMAGEBUILDER_DIR" imagebuilder
          echo "Successfully renamed to imagebuilder"
      
      - name: Check available profiles
        run: |
          cd imagebuilder
          echo "Running make info to get available profiles..."
          make info
          
          echo ""
          echo "=== Looking for Cudy profiles ==="
          make info | grep -i cudy || echo "No cudy profiles found!"
          
          echo ""
          echo "=== Looking for TR1200 profiles ==="
          make info | grep -i tr1200 || echo "No TR1200 profiles found!"
          
          echo ""
          echo "=== All available profiles containing '1200' ==="
          make info | grep 1200 || echo "No profiles with 1200 found!"
      
      - name: Get exact profile name
        id: profile
        run: |
          cd imagebuilder
          
          # Получаем точное имя профиля
          PROFILE=$(make info | grep -i "tr1200" | head -1 | awk '{print $2}')
          
          if [ -z "$PROFILE" ]; then
            echo "Searching for alternative profile names..."
            # Пробуем разные варианты
            PROFILE=$(make info | grep -E "(cudy.*1200|tr1200)" -i | head -1 | awk '{print $2}')
          fi
          
          if [ -z "$PROFILE" ]; then
            echo "ERROR: Could not find profile for Cudy TR1200!"
            echo "All available profiles:"
            make info | head -50
            exit 1
          fi
          
          echo "Found profile: $PROFILE"
          echo "profile=$PROFILE" >> $GITHUB_OUTPUT
      
      - name: Build firmware
        run: |
          cd imagebuilder
          
          echo "Building with profile: ${{ steps.profile.outputs.profile }}"
          make image \
            PROFILE="${{ steps.profile.outputs.profile }}" \
            PACKAGES="kmod-usb-core kmod-usb2 kmod-usb-ohci kmod-usb-net \
              kmod-usb-net-cdc-ether kmod-usb-net-rndis kmod-usb-serial \
              kmod-usb-serial-option kmod-usb-serial-wwan kmod-usb-wdm \
              usb-modeswitch comgt comgt-ncm luci-proto-3g luci-proto-qmi \
              luci-proto-ncm luci-proto-modemmanager modemmanager \
              kmod-fs-ext4 kmod-fs-vfat kmod-fs-exfat block-mount \
              xray-core luci-app-xray luci luci-ssl curl wget htop" \
            BIN_DIR="${{ github.workspace }}/output"
          
          echo "Build completed successfully!"
      
      - name: Collect firmware files
        run: |
          echo "Collecting firmware files..."
          mkdir -p firmware-output
          
          find output/ -name "*.bin" -exec cp {} firmware-output/ \; 2>/dev/null || true
          find output/ -name "*.manifest" -exec cp {} firmware-output/ \; 2>/dev/null || true
          
          echo "OpenWrt Custom Build" > firmware-output/README.txt
          echo "Device: Cudy TR1200 v1" >> firmware-output/README.txt
          echo "Target: ramips/mt76x8" >> firmware-output/README.txt
          echo "Build date: $(date)" >> firmware-output/README.txt
          echo "" >> firmware-output/README.txt
          echo "Included packages:" >> firmware-output/README.txt
          echo "- USB modem support (CDC, RNDIS, QMI, NCM)" >> firmware-output/README.txt
          echo "- VLESS protocol (Xray-core)" >> firmware-output/README.txt
          echo "- USB storage support (ext4, vfat, exfat)" >> firmware-output/README.txt
          
          echo "Files collected:"
          ls -la firmware-output/ || echo "WARNING: No firmware files found!"
      
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: cudy-tr1200-v1-firmware
          path: firmware-output/
          retention-days: 30
