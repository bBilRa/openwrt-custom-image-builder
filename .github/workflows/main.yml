name: Build OpenWrt TR1200 - Ultra Minimal VLESS + USB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build ultra minimal firmware
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential libncurses-dev zlib1g-dev \
            gawk git gettext libssl-dev xsltproc wget unzip python3 file libelf-dev
          
          wget -q https://downloads.openwrt.org/releases/23.05.4/targets/ramips/mt76x8/openwrt-imagebuilder-23.05.4-ramips-mt76x8.Linux-x86_64.tar.xz
          mkdir -p imagebuilder
          tar -xf openwrt-imagebuilder-*.tar.xz --strip-components=1 -C imagebuilder/
          cd imagebuilder
          
          PROFILE=$(make info | grep -i "tr1200" | head -1 | cut -d: -f1)
          
          # Ультра-минимальная сборка
          make image \
            PROFILE="$PROFILE" \
            PACKAGES="\
              kmod-usb-core kmod-usb2 kmod-usb-ohci \
              kmod-usb-net kmod-usb-net-cdc-ether kmod-usb-net-rndis \
              kmod-usb-serial kmod-usb-serial-option \
              usb-modeswitch \
              luci-proto-3g luci-proto-ncm \
              comgt comgt-ncm \
              xray-core \
              luci \
              -ip6tables -kmod-ip6tables -kmod-ipv6 -ipv6helper \
              -odhcp6c -odhcpd-ipv6only \
              -ppp -ppp-mod-pppoe -kmod-ppp -kmod-pppoe \
              -luci-i18n-* \
              -kmod-nls-* \
              -wpad-basic-wolfssl \
              -dnsmasq \
              -firewall4 \
              -nftables-json \
              -kmod-nft-offload \
              -odhcpd \
              -uhttpd \
              -rpcd \
              dnsmasq-full \
              uhttpd-mod-ubus \
            " \
            BIN_DIR="${{ github.workspace }}/firmware"
      
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: tr1200-ultra-minimal-vless-usb
          path: firmware/
          retention-days: 30
