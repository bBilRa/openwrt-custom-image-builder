name: Build OpenWrt for Cudy TR1200 v1

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev zlib1g-dev \
            gawk git gettext libssl-dev xsltproc wget unzip python3 file libelf-dev
      
      - name: Download OpenWrt Image Builder
        run: |
          wget https://downloads.openwrt.org/releases/23.05.4/targets/ramips/mt76x8/openwrt-imagebuilder-23.05.4-ramips-mt76x8.Linux-x86_64.tar.xz
          echo "Archive downloaded, extracting..."
          tar -xf openwrt-imagebuilder-*.tar.xz
          echo "Extraction completed. Current directory contents:"
          ls -la
      
      - name: Find and rename imagebuilder directory
        run: |
          # Находим точное имя распакованной директории
          IMAGEBUILDER_DIR=$(ls -d openwrt-imagebuilder-*)
          echo "Found imagebuilder directory: $IMAGEBUILDER_DIR"
          
          # Переименовываем в 'imagebuilder' для удобства
          mv "$IMAGEBUILDER_DIR" imagebuilder
          echo "Renamed to imagebuilder"
          
          # Проверяем содержимое
          echo "imagebuilder contents:"
          ls -la imagebuilder/
      
      - name: Build firmware
        run: |
          cd imagebuilder
          
          echo "Building firmware for cudy,tr1200-v1..."
          make image \
            PROFILE="cudy,tr1200-v1" \
            PACKAGES="kmod-usb-core kmod-usb2 kmod-usb-ohci kmod-usb-net \
              kmod-usb-net-cdc-ether kmod-usb-net-rndis kmod-usb-serial \
              kmod-usb-serial-option kmod-usb-serial-wwan kmod-usb-wdm \
              usb-modeswitch comgt comgt-ncm luci-proto-3g luci-proto-qmi \
              luci-proto-ncm luci-proto-modemmanager modemmanager \
              kmod-fs-ext4 kmod-fs-vfat kmod-fs-exfat block-mount \
              xray-core luci-app-xray luci luci-ssl curl wget htop" \
            BIN_DIR="${{ github.workspace }}/output"
          
          echo "Build completed!"
      
      - name: Check build results
        run: |
          echo "Checking output directory..."
          if [ -d "output" ]; then
            echo "Output directory contents:"
            find output/ -type f -name "*.bin" -o -name "*.manifest"
          else
            echo "ERROR: No output directory found!"
            exit 1
          fi
      
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: cudy-tr1200-v1-firmware
          path: output/**
          retention-days: 30
